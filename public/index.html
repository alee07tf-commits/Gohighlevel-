<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Upcro — All-in-one CRM & Marketing</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Upcro">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<div id="cookie-banner" style="display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:9999;max-width:640px;margin:0 auto;background:#0f172a;color:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 12px 40px rgba(0,0,0,.3);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;gap:12px;align-items:center;flex-wrap:wrap">
  <span style="flex:1;min-width:220px">Usamos cookies técnicas y almacenamiento local para el funcionamiento del servicio. <a href="/legal/cookies" style="color:#c7d2fe">Más info</a>.</span>
  <button id="cookie-accept" style="background:#6d5ef5;color:#fff;border:0;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer">Aceptar</button>
</div>
<script>
  (function(){try{
    var b=document.getElementById('cookie-banner');
    if(!localStorage.getItem('upcro_cookie_ok')){b.style.display='flex';}
    document.getElementById('cookie-accept').addEventListener('click',function(){localStorage.setItem('upcro_cookie_ok','1');b.style.display='none';});
  }catch(e){}})();
</script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
